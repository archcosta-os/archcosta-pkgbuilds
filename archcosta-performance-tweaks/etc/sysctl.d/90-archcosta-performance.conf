# ArchCosta Performance Optimizations
# Inspired by Garuda Linux and CachyOS

# Reduce swappiness to keep more data in RAM
vm.swappiness = 10

# Optimize file system cache
vm.vfs_cache_pressure = 50

# Increase maximum number of open file descriptors
fs.file-max = 2097152

# Network optimizations (BBR and buffer sizes)
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Low latency kernel tweaks
kernel.sched_latency_ns = 1000000
kernel.sched_min_granularity_ns = 100000
kernel.sched_wakeup_granularity_ns = 100000
