name: Build and Publish Packages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm base-devel git curl cmake extra-cmake-modules ninja gcc qt6-base qt6-declarative qt6-svg qt6-tools yaml-cpp kpmcore boost-libs github-cli ccache qt6-imageformats gtk4 libadwaita
          
          # Disable debug symbols to save space
          sed -i 's/debug/!debug/g' /etc/makepkg.conf
          sed -i 's/strip/!strip/g' /etc/makepkg.conf

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-pkgbuild-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-pkgbuild-

      - name: Build all packages
        run: |
          export CCACHE_DIR="${{ github.workspace }}/.ccache"
          export PATH="/usr/lib/ccache/bin:$PATH"
          export MAKEFLAGS="-j$(nproc)"
          
          mkdir -p "$CCACHE_DIR"
          useradd -m build
          
          # Fix permissions for the workspace and ccache dir
          chown -R build:build .
          chown -R build:build "$CCACHE_DIR"
          chmod -R 777 "$CCACHE_DIR"
          
          mkdir -p built-packages
          chown -R build:build built-packages
          
          # List of all 28 packages (Fastest first)
          PKGS=(archcosta-plasma archcosta-xfce archcosta-cinnamon archcosta-mate archcosta-xfce-config archcosta-cinnamon-settings archcosta-mate-settings archcosta-bash-shared archcosta-hooks archcosta-performance-tweaks archcosta-settings archcosta-skeleton archcosta-artwork archcosta-welcome archcosta-wiki archcosta-update-notifier archcosta-log-tool archcosta-kernel-manager archcosta-assistant archcosta-gamer archcosta-update ckbcomp mkinitcpio-openswap calamares-settings-arch)
          
          for pkg in "${PKGS[@]}"; do
            if [ -d "$pkg" ]; then
              echo "Building $pkg..."
              cd "$pkg"
              if su build -c "makepkg -scf --noconfirm --nodeps"; then
                mv *.pkg.tar.zst ../built-packages/
              else
                echo "::error::Failed to build $pkg"
              fi
              cd ..
            fi
          done

      - name: Create pacman repo database
        run: |
          mkdir -p repo/
          
          # 1. Download existing database to preserve other packages
          curl -L https://archcosta-os.github.io/archcosta-pkgbuilds/archcosta.db.tar.gz -o repo/archcosta.db.tar.gz || true
          
          # 2. Copy newly built packages
          cp built-packages/*.pkg.tar.zst repo/ || true
          
          cd repo
          # 3. Add packages to the EXISTING database
          if ls *.pkg.tar.zst 1> /dev/null 2>&1; then
            repo-add -n -R archcosta.db.tar.gz *.pkg.tar.zst
            ln -sf archcosta.db.tar.gz archcosta.db
            ln -sf archcosta.files.tar.gz archcosta.files
          fi
          cd ..

      - name: Deploy Database to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          keep_files: false
