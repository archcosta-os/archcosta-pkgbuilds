name: Build and Publish Packages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          pacman -Syu --noconfirm base-devel git
          # Add CachyOS repos for dependencies
          echo "[cachyos]" >> /etc/pacman.conf
          echo "SigLevel = Optional TrustAll" >> /etc/pacman.conf
          echo "Server = https://mirror.cachyos.org/repo/\$arch/\$repo" >> /etc/pacman.conf

      - name: Build all packages
        run: |
          # We need to allow root to run makepkg for this environment, but it's not ideal.
          # Alternatively, create a user 'build'
          useradd -m build
          chown -R build:build .
          
          for pkg in archcosta-settings archcosta-skeleton archcosta-artwork archcosta-xfce-config archcosta-welcome brave-bin; do
            if [ -d "$pkg" ]; then
              cd "$pkg"
              # As build user
              su build -c "makepkg -sc --noconfirm" || true
              cd ..
            fi
          done

      - name: Create pacman repo database
        run: |
          mkdir -p repo/
          cp */*.pkg.tar.zst repo/ || true
          cd repo
          repo-add archcosta.db.tar.gz *.pkg.tar.zst
          # Symlink db and files so pacman can find them
          ln -sf archcosta.db.tar.gz archcosta.db
          ln -sf archcosta.files.tar.gz archcosta.files
          cd ..

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo