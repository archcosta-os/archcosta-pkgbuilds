name: Build and Publish Packages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          # Initialize keyring first
          pacman-key --init
          pacman-key --populate archlinux
          
          # Install base-devel, git, and curl from official repos
          pacman -Syu --noconfirm base-devel git curl
          
          # Add CachyOS repos for dependencies with SigLevel = Never to avoid GPG prompts in CI
          echo "" >> /etc/pacman.conf
          echo "[cachyos]" >> /etc/pacman.conf
          echo "SigLevel = Never" >> /etc/pacman.conf
          echo "Server = https://mirror.cachyos.org/repo/x86_64/cachyos" >> /etc/pacman.conf
          
          pacman -Sy
          
          # Pre-install all known dependencies for our packages as root
          pacman -S --noconfirm xfce4 matcha-gtk-theme papirus-icon-theme gtk3 nss alsa-lib python python-gobject

      - name: Build all packages
        run: |
          useradd -m build
          chown -R build:build .
          
          for pkg in archcosta-settings archcosta-skeleton archcosta-artwork archcosta-xfce-config archcosta-welcome brave-bin; do
            if [ -d "$pkg" ]; then
              echo "Building $pkg..."
              cd "$pkg"
              # Use --nodeps because we installed them above as root
              su build -c "makepkg -sc --noconfirm --nodeps" || echo "Failed to build $pkg"
              cd ..
            fi
          done

      - name: Create pacman repo database
        run: |
          mkdir -p repo/
          cp */*.pkg.tar.zst repo/ || true
          cd repo
          if ls *.pkg.tar.zst 1> /dev/null 2>&1; then
            repo-add archcosta.db.tar.gz *.pkg.tar.zst
            ln -sf archcosta.db.tar.gz archcosta.db
            ln -sf archcosta.files.tar.gz archcosta.files
          else
            echo "No packages found to add to repo!"
            exit 1
          fi
          cd ..

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo