name: Verify Package Builds

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm base-devel git curl cmake extra-cmake-modules ninja gcc qt6-base qt6-declarative qt6-svg qt6-tools yaml-cpp kpmcore boost-libs github-cli ccache qt6-imageformats gtk4 libadwaita

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-pkgbuild-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-pkgbuild-

      - name: Build all packages
        run: |
          export CCACHE_DIR="${{ github.workspace }}/.ccache"
          export PATH="/usr/lib/ccache/bin:$PATH"
          export MAKEFLAGS="-j$(nproc)"
          
          mkdir -p "$CCACHE_DIR"
          useradd -m build
          chown -R build:build .
          chown -R build:build "$CCACHE_DIR"
          chmod -R 777 "$CCACHE_DIR"
          
          # Test build all packages to ensure they are valid
          PKGS=(archcosta-plasma archcosta-xfce archcosta-cinnamon archcosta-mate archcosta-xfce-config archcosta-cinnamon-settings archcosta-mate-settings archcosta-bash-shared archcosta-hooks archcosta-performance-tweaks archcosta-settings archcosta-skeleton archcosta-artwork archcosta-welcome archcosta-installer archcosta-wiki archcosta-update-notifier archcosta-log-tool archcosta-kernel-manager archcosta-assistant archcosta-gamer archcosta-update ckbcomp mkinitcpio-openswap calamares-settings-arch)
          
          for pkg in "${PKGS[@]}"; do
            if [ -d "$pkg" ]; then
              echo "Verifying build for $pkg..."
              cd "$pkg"
              su build -c "makepkg -scf --noconfirm --nodeps"
              cd ..
            fi
          done
