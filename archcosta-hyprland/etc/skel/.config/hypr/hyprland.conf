# Hyprland config for ArchCosta

# Monitor settings
monitor=,preferred,auto,1

# Autostart
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = blueman-applet &
exec-once = volumeicon &
exec-once = dex --autostart --environment Hyprland
exec-once = swww-daemon
exec-once = xdg-user-dirs-update
exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland

# Input
input {
  kb_layout = us
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =

  follow_mouse = 1
  sensitivity = 0
  accel_profile = flat

  touchpad {
    natural_scroll = true
    disable_while_typing = true
    tap-to-click = true
  }
}

# General window settings
general {
  gaps_in = 4
  gaps_out = 8
  border_size = 2
  col.active_border = rgba(bd93f9ee) rgba(6272a4ee) 45deg
  col.inactive_border = rgba(44475aee) rgba(282a36ee) 45deg

  layout = dwindle
  resize_on_border = true
}

# Decoration
decoration {
  rounding = 8
  active_opacity = 1.0
  inactive_opacity = 0.95
  fullscreen_opacity = 1.0

  drop_shadow = true
  shadow_range = 20
  shadow_render_power = 3
  col.shadow = rgba(1a1a1aee)
  col.shadow_inactive = rgba(1a1a1aee)

  blur {
    enabled = true
    size = 5
    passes = 3
    new_optimizations = true
    xray = false
    ignore_opacity = false
  }
}

# Animation
animations {
  enabled = true
  bezier = myBezier, 0.05, 0.9, 0.1, 1.05
  bezier = overshot, 0.13, 0.99, 0.29, 1.1
  bezier = smoothOut, 0.36, 0, 0.66, -0.56
  bezier = smoothIn, 0.25, 1, 0.5, 1

  animation = windows, 1, 7, overshot, slide
  animation = windowsOut, 1, 7, smoothOut, slide
  animation = border, 1, 10, default
  animation = borderangle, 1, 8, default
  animation = fade, 1, 7, smoothIn
  animation = fadeDim, 1, 7, smoothIn
  animation = workspaces, 1, 6, default
}

# Dwindle layout
dwindle {
  pseudotile = true
  preserve_split = true
  force_split = 2
  split_width_multiplier = 1.0
  no_gaps_when_only = false
  use_active_for_splits = true
  default_split_ratio = 1.0
}

# Master layout
master {
  new_is_master = true
  new_on_top = false
  new_on_left = true
  mfact = 0.5
  orientation = left
  inherit_fullscreen = true
}

# Gestures
gestures {
  workspace_swipe = true
  workspace_swipe_fingers = 3
  workspace_swipe_distance = 300
  workspace_swipe_invert = true
  workspace_swipe_min_speed_to_force = 30
  workspace_swipe_cancel_ratio = 0.5
  workspace_swipe_create_new = true
  workspace_swipe_forever = false
}

# Miscellaneous
misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
  key_press_enables_dpms = true
  vrr = 0
  vfr = true
  enable_swallow = true
  swallow_regex = ^(wezterm|kitty|alacritty)$
  focus_on_activate = false
  no_direct_scanout = false
  hide_cursor_on_touch = true
  mouse_move_focuses_monitor = true
  render_ahead_of_time = false
  render_ahead_safezone = 1
  allow_session_lock_restore = true
}

# Window rules
windowrulev2 = float, class: ^(pavucontrol|nm-connection-editor|blueman-manager|qt5ct|qt6ct|nm-applet)$
windowrulev2 = opacity 0.90 0.90, class: ^(pavucontrol|nm-connection-editor|blueman-manager)$
windowrulev2 = workspace 2, class: ^(firefox)$
windowrulev2 = workspace 6, class: ^(Spotify|discord)$
windowrulev2 = fullscreen, class: ^(mpv)$
windowrulev2 = fullscreen, title: ^(Picture-in-Picture)$

# Workspace rules
workspace = 1, persistent:true, monitor:0, default:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true
workspace = 6, persistent:true
workspace = 7, persistent:true
workspace = 8, persistent:true
workspace = 9, persistent:true

# Env variables
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt5ct
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = GDK_BACKEND,wayland,x11
env = GTK_THEME,Dracula

# Keybindings
$mainMod = SUPER

bind = $mainMod, Q, exec, alacritty
bind = $mainMod, C, killactive, 
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, thunar
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, wofi --show drun
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, space, rotatewindow, 90

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move focus with mainMod + vim keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, Print, exec, grim - | wl-copy
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# Lock screen
bind = $mainMod SHIFT, X, exec, swaylock -f -i /usr/share/backgrounds/archlinux/archlinux-logo.png

# Volume controls
bindl = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Brightness controls
bindl = , XF86MonBrightnessUp, exec, brightnessctl set 10%+
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
