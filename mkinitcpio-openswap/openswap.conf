## Configuration for openswap hook
# The UUID of the encrypted swap partition (check 'blkid')
swap_device_uuid="YOUR-SWAP-PARTITION-UUID"

# The name you want the mapped device to have (e.g., /dev/mapper/swap)
crypt_swap_name="cryptswap"

# Additional options for cryptsetup (optional)
openswap_options="--allow-discards"
